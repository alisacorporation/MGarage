<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
<title>MGarage — Журнал ремонта</title>
<meta name="description" content="Личный офлайн-журнал ремонта автомобилей" />
<meta name="theme-color" content="#0E1116" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MGarage" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="splash" class="splash">
  <div class="splash-stripe"><span></span><span></span><span></span></div>
  <div class="splash-logo">M<span class="splash-logo-accent">Garage</span></div>
  <div class="splash-sub">ЖУРНАЛ РЕМОНТА</div>
</div>

<div id="toast-root" class="toast-root" aria-live="polite"></div>

<div class="app-shell">

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-stripe"><span></span><span></span><span></span></div>
        <div class="brand-name">M<span class="brand-accent">Garage</span></div>
      </div>
      <button id="installBtn" class="install-btn hidden" type="button">Установить</button>
    </div>
  </header>

  <main id="app" class="app-main" role="main"></main>

  <nav class="bottombar" id="bottomNav">
    <button class="nav-item" data-route="home" aria-label="Главная">
      <svg viewBox="0 0 24 24" class="nav-icon"><path d="M4 11.5L12 4l8 7.5V20a1 1 0 0 1-1 1h-5v-6H10v6H5a1 1 0 0 1-1-1z"/></svg>
      <span>Главная</span>
    </button>
    <button class="nav-item" data-route="history" aria-label="История">
      <svg viewBox="0 0 24 24" class="nav-icon"><path d="M12 21a9 9 0 1 0-8.4-12M3 5v5h5"/><path d="M12 7v5l4 2"/></svg>
      <span>История</span>
    </button>
    <button class="nav-item nav-item-fab" data-route="new" aria-label="Новая работа">
      <span class="fab">
        <svg viewBox="0 0 24 24" class="nav-icon-fab"><path d="M12 5v14M5 12h14"/></svg>
      </span>
    </button>
    <button class="nav-item" data-route="stats" aria-label="Статистика">
      <svg viewBox="0 0 24 24" class="nav-icon"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
      <span>Статистика</span>
    </button>
    <button class="nav-item" data-route="backup" aria-label="Резервная копия">
      <svg viewBox="0 0 24 24" class="nav-icon"><path d="M12 3v12m0 0l-4-4m4 4l4-4M5 19h14"/></svg>
      <span>Копия</span>
    </button>
  </nav>

</div>

<div id="modalRoot"></div>
<div id="printArea"></div>

<script src="db.js"></script>
<script src="charts.js"></script>
<script src="search.js"></script>
<script src="export.js"></script>
<script src="import.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>
</body>
</html>
